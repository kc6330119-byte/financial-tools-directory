[build]
  command = "pip install -r requirements.txt && python build.py"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.9"

# Enable pretty URLs
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success/index.html"
  status = 200

[[redirects]]
  from = "/success/"
  to = "/success/index.html"
  status = 200

[[redirects]]
  from = "/tools"
  to = "/tools.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200
